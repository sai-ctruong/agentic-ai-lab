<svg xmlns="http://www.w3.org/2000/svg" width="1290" height="755" viewBox="0 0 1290 755" role="img" aria-labelledby="title desc">
  <title id="title">Advanced AI Tutor Gradio interface preview</title>
  <desc id="desc">Dark Gradio interface with a question panel, explanation slider, action buttons, and tutor response panel.</desc>
  <rect width="1290" height="755" fill="#101012"/>
  <rect x="0" y="0" width="1290" height="755" fill="none" stroke="#202024" stroke-width="4"/>

  <text x="482" y="64" fill="#f8fafc" font-family="Arial, sans-serif" font-size="38" font-weight="700">Advanced AI Tutor</text>
  <text x="129" y="124" fill="#f8fafc" font-family="Arial, sans-serif" font-size="20">Ask a question and select and desired level of explanation using the slider.</text>

  <rect x="128" y="159" width="516" height="300" rx="5" fill="#25262a" stroke="#3d3f46"/>
  <text x="146" y="197" fill="#f8fafc" font-family="Arial, sans-serif" font-size="20">Your Question</text>
  <rect x="147" y="216" width="478" height="118" rx="5" fill="#26272b" stroke="#44464e"/>
  <text x="163" y="254" fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="600">What are functions in Python?</text>

  <text x="147" y="386" fill="#f8fafc" font-family="Arial, sans-serif" font-size="20">Explanation Level</text>
  <rect x="490" y="365" width="134" height="35" rx="5" fill="#232428" stroke="#3f4149"/>
  <line x1="584" y1="365" x2="584" y2="400" stroke="#3f4149"/>
  <text x="523" y="389" fill="#ffffff" font-family="Arial, sans-serif" font-size="16" font-weight="700">3</text>
  <text x="598" y="389" fill="#ffffff" font-family="Arial, sans-serif" font-size="18">↻</text>
  <text x="148" y="437" fill="#dbe4ff" font-family="Arial, sans-serif" font-size="16">1</text>
  <line x1="177" y1="430" x2="592" y2="430" stroke="#dedee2" stroke-width="12" stroke-linecap="round"/>
  <line x1="177" y1="430" x2="385" y2="430" stroke="#ff7a1a" stroke-width="12" stroke-linecap="round"/>
  <circle cx="385" cy="430" r="13" fill="#f5f5f5" stroke="#cccccc" stroke-width="2"/>
  <text x="613" y="437" fill="#dbe4ff" font-family="Arial, sans-serif" font-size="16">5</text>

  <rect x="128" y="483" width="246" height="59" rx="7" fill="#5f6069"/>
  <text x="225" y="521" fill="#ffffff" font-family="Arial, sans-serif" font-size="22" font-weight="700">Clear</text>
  <rect x="398" y="483" width="246" height="59" rx="7" fill="#f65a05"/>
  <text x="485" y="521" fill="#ffffff" font-family="Arial, sans-serif" font-size="22" font-weight="700">Submit</text>

  <rect x="668" y="159" width="516" height="376" rx="4" fill="#25262a" stroke="#3d3f46"/>
  <rect x="1159" y="159" width="25" height="376" fill="#efefef"/>
  <path d="M1172 167 L1179 177 L1165 177 Z" fill="#8c8c8c"/>
  <rect x="1165" y="187" width="14" height="26" rx="7" fill="#8c8c8c"/>
  <path d="M1165 517 L1179 517 L1172 527 Z" fill="#8c8c8c"/>

  <text x="688" y="199" fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="700">Hey there! Great question! Functions are one of the</text>
  <text x="688" y="233" fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="700">most fundamental and powerful concepts in Python</text>
  <text x="688" y="267" fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="700">(and pretty much any programming language).</text>
  <text x="688" y="325" fill="#ffffff" font-family="Arial, sans-serif" font-size="20">Let's break it down like this:</text>
  <text x="688" y="383" fill="#ffffff" font-family="Arial, sans-serif" font-size="22" font-weight="700">What are Functions in Python?</text>
  <text x="688" y="439" fill="#ffffff" font-family="Arial, sans-serif" font-size="20">Imagine you have a mini-robot that's really good at</text>
  <text x="688" y="473" fill="#ffffff" font-family="Arial, sans-serif" font-size="20">doing one specific job. You can tell this robot what</text>
  <text x="688" y="507" fill="#ffffff" font-family="Arial, sans-serif" font-size="20">to do by giving it a name, and then whenever you</text>

  <text x="421" y="721" fill="#dbe4ff" font-family="Arial, sans-serif" font-size="18">Use via API</text>
  <text x="529" y="721" fill="#ff7a1a" font-family="Arial, sans-serif" font-size="18">rocket</text>
  <text x="589" y="721" fill="#dbe4ff" font-family="Arial, sans-serif" font-size="18">·</text>
  <text x="606" y="721" fill="#dbe4ff" font-family="Arial, sans-serif" font-size="18">Built with Gradio</text>
  <text x="759" y="721" fill="#ffb000" font-family="Arial, sans-serif" font-size="18">logo</text>
  <text x="803" y="721" fill="#dbe4ff" font-family="Arial, sans-serif" font-size="18">·</text>
  <text x="819" y="721" fill="#dbe4ff" font-family="Arial, sans-serif" font-size="18">Settings</text>
</svg>
